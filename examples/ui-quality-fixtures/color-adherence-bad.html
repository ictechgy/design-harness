<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Color adherence fixture</title>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        color: #14171C;
        background: #FAFAF7;
        font-family: "Inter", sans-serif;
      }
      main {
        max-width: 36rem;
        padding: 1rem;
        background: #FFFFFF;
        border-right: 4px solid #C026D3;
      }
      .transparent-control {
        width: 4rem;
        height: 1rem;
        background: transparent;
      }
      .non-painted-border-control {
        width: 4rem;
        height: 1rem;
        background: #FFFFFF;
        border: 4px none #C026D3;
      }
      .transparent-border-control {
        width: 4rem;
        height: 1rem;
        background: #FFFFFF;
        border: 1px solid transparent;
      }
      .background-image-control {
        width: 4rem;
        height: 1rem;
        background-color: #C026D3;
        background-image: linear-gradient(#1F61D1, #1F61D1);
      }
      .border-image-control {
        width: 4rem;
        height: 1rem;
        background: #FFFFFF;
        border: 4px solid #C026D3;
        border-image: linear-gradient(#1F61D1, #1F61D1) 1;
      }
      .hidden-off-palette {
        display: none;
        color: #C026D3;
        background: #C026D3;
        border: 1px solid #C026D3;
      }
      .opacity-zero-off-palette,
      .opacity-zero-parent {
        opacity: 0;
        color: #C026D3;
        background: #C026D3;
        border: 1px solid #C026D3;
      }
    </style>
  </head>
  <body>
    <main id="palette-sample">
      <h1>Account overview</h1>
      <p>Direct text, surfaces, and the painted rail all use project color tokens.</p>
      <div class="transparent-control" aria-hidden="true"></div>
      <div class="non-painted-border-control" aria-hidden="true"></div>
      <div class="transparent-border-control" aria-hidden="true"></div>
      <div class="background-image-control" aria-hidden="true"></div>
      <div class="border-image-control" aria-hidden="true"></div>
      <div class="hidden-off-palette">Non-rendered off-palette control.</div>
      <div class="opacity-zero-off-palette" aria-hidden="true">Fully transparent paint.</div>
      <div class="opacity-zero-parent" aria-hidden="true">
        <span>Paint below a fully transparent ancestor.</span>
      </div>
      <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
        <rect width="24" height="24" fill="#C026D3" stroke="#C026D3"></rect>
      </svg>
    </main>
  </body>
</html>
