<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>한국어 카피 양호 픽스처</title>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        color: #202124;
        background: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
      }

      main {
        max-width: 42rem;
        margin: 0 auto;
      }

      p {
        margin: 0.75rem 0;
        line-height: 1.6;
      }

      button {
        min-height: 2.75rem;
        padding: 0.5rem 1rem;
        color: #ffffff;
        background: #155eef;
        border: 0;
        border-radius: 4px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>결제 안내</h1>
      <p>민수님, 주문 내용을 확인하세요.</p>
      <p>배송지를 확인하세요.</p>
      <p>계정 탈퇴는 설정에서 진행하세요.</p>
      <p>새 기능을 지금 만나보세요.</p>
      <p>선택한 뒤 예상 결과를 확인할 수 있습니다.</p>
      <p>중괄호 {예시}는 그대로 표시할 수 있습니다.</p>
      <p>파일을(를) 선택할 수 있습니다.</p>
      <button type="button">계속</button>
      <button type="button"><span id="nested-button-copy">확인</span></button>
      <button type="button"><span id="direct-surface-copy">현재 노드 우선</span></button>
      <button type="button"><span id="nearest-surface-wrapper"><span id="nearest-surface-copy">가까운 조상 우선</span></span></button>
      <div id="multi-role-copy" role="unknown-token SWITCH checkbox">표시 역할 전환</div>
      <aside><span>매핑되지 않은 참고 문구</span></aside>
    </main>
  </body>
</html>
