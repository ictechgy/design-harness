<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>한국어 카피 결함 픽스처</title>
    <style>
      body {
        margin: 0;
        padding: 2rem;
        color: #202124;
        background: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
      }

      main {
        max-width: 42rem;
        margin: 0 auto;
      }

      p {
        margin: 0.75rem 0;
        line-height: 1.6;
      }

      button {
        min-height: 2.75rem;
        padding: 0.5rem 1rem;
        color: #ffffff;
        background: #155eef;
        border: 0;
        border-radius: 4px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>결제 안내</h1>
      <p>{{customer_name}}님, 주문 내용을 확인하세요.</p>
      <p>배송지을(를) 확인하세요.</p>
      <p>계정 해지는 설정에서 진행하세요.</p>
      <p>혁신적인 기능을 지금 만나보세요.</p>
      <p>이 선택은 무조건 성공합니다.</p>
      <button type="button">계속</button>
      <div id="multi-role-copy" role="unknown-token SWITCH checkbox">표시 역할 전환</div>
      <aside><span>매핑되지 않은 참고 문구</span></aside>
    </main>
  </body>
</html>
