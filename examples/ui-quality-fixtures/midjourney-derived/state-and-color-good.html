<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Midjourney-Derived State And Color Good Fixture</title>
    <style>
      body {
        background: #f7f8fa;
        color: #1f2933;
        font-family: Arial, sans-serif;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 760px;
        padding: 32px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        padding: 20px;
      }

      .checklist {
        display: grid;
        gap: 10px;
        list-style: none;
        margin: 20px 0 0;
        padding: 0;
      }

      .step {
        align-items: center;
        background: #f4f6f8;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        display: grid;
        gap: 10px;
        grid-template-columns: 28px 1fr;
        min-height: 44px;
        padding: 10px 12px;
      }

      .step.done {
        background: #e8f5ee;
        border-color: #8bc7a3;
        color: #124d2b;
      }

      .step.current {
        background: #fff7ed;
        border-color: #f97316;
        color: #7c2d12;
        font-weight: 700;
      }

      [role="checkbox"] {
        align-items: center;
        border: 2px solid currentColor;
        border-radius: 999px;
        display: inline-grid;
        height: 24px;
        justify-content: center;
        width: 24px;
      }

      [aria-checked="true"]::before {
        content: "✓";
      }

      button {
        background: #f97316;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        font-weight: 700;
        margin-top: 20px;
        min-height: 44px;
        padding: 10px 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="setup-title">
        <h1 id="setup-title">Launch checklist</h1>
        <p>One accent color identifies the current task while completed and inactive states stay consistent.</p>
        <ul class="checklist">
          <li class="step done">
            <span role="checkbox" aria-checked="true" aria-label="Profile complete"></span>
            <span>Complete business profile</span>
          </li>
          <li class="step done">
            <span role="checkbox" aria-checked="true" aria-label="Catalog complete"></span>
            <span>Add starter catalog</span>
          </li>
          <li class="step current">
            <span role="checkbox" aria-checked="false" aria-label="Delivery pending"></span>
            <span>Choose delivery window</span>
          </li>
          <li class="step">
            <span role="checkbox" aria-checked="false" aria-label="Invite pending"></span>
            <span>Invite team member</span>
          </li>
        </ul>
        <button type="button">Continue setup</button>
      </section>
    </main>
  </body>
</html>
