<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsive Readability Bad Fixture</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
      }

      .sticky-banner {
        background: #111111;
        color: #ffffff;
        height: 230px;
        left: 0;
        position: fixed;
        right: 0;
        top: 0;
      }

      main {
        margin-top: 250px;
        width: 1180px;
      }

      .tiny {
        height: 18px;
        width: 18px;
      }
    </style>
  </head>
  <body>
    <div class="sticky-banner">Large sticky promotion</div>
    <main>
      <h1>Wide article</h1>
      <p>
        This text is intentionally placed inside a very wide fixed-width container so readability
        checks can report a low-confidence line-length risk. The content is visible, but the line
        measure is uncomfortable for repeated reading and should be reviewed.
      </p>
      <button type="button" class="tiny" aria-label="Tiny close button">x</button>
    </main>
  </body>
</html>
