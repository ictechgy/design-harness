schemaVersion: "0.2"
tokens:
  color:
    semantic:
      $type: color
      background:
        $value:
          colorSpace: srgb
          components: [0.98, 0.98, 0.97]
          alpha: 1
      surface:
        $value:
          colorSpace: srgb
          components: [1, 1, 1]
          alpha: 1
      text:
        $value:
          colorSpace: srgb
          components: [0.08, 0.09, 0.11]
          alpha: 1
      accent:
        $value:
          colorSpace: srgb
          components: [0.12, 0.38, 0.82]
          alpha: 1
  font:
    family:
      $type: fontFamily
      heading:
        $value: ["Space Grotesk", "sans-serif"]
      body:
        $value: ["Pretendard", "sans-serif"]
  spacing:
    $type: dimension
    sm:
      $value: { value: 0.5, unit: rem }
    md:
      $value: { value: 1, unit: rem }
  radius:
    $type: dimension
    none:
      $value: { value: 0, unit: px }
    md:
      $value: { value: 8, unit: px }
prohibitions:
  - decorative-gradient-without-purpose
  - generic-card-grid
signatureElement: "Use a compact outlined status rail as the recurring product signature."
audit:
  fontFamily:
    additionalAllowedFamilies:
      - { value: "Pretendard Fallback", kind: named }
      - { value: -apple-system, kind: named }
      - { value: BlinkMacSystemFont, kind: named }
      - { value: system-ui, kind: generic }
      - { value: "Apple SD Gothic Neo", kind: named }
      - { value: "Noto Sans KR", kind: named }
      - { value: "Malgun Gothic", kind: named }
      - { value: "JetBrains Mono", kind: named }
      - { value: "JetBrains Mono Fallback", kind: named }
      - { value: ui-monospace, kind: generic }
      - { value: SFMono-Regular, kind: named }
      - { value: Menlo, kind: named }
      - { value: monospace, kind: generic }
      - { value: "Space Grotesk Fallback", kind: named }
      - { value: system-ui, kind: named }
      - { value: Rogue, kind: named }
