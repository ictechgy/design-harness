schemaVersion: "0.2"
tokens:
  color:
    semantic:
      $type: color
      background:
        $value: { colorSpace: srgb, components: [0.98, 0.98, 0.97], alpha: 1 }
      surface:
        $value: { colorSpace: srgb, components: [1, 1, 1], alpha: 1 }
      text:
        $value: { colorSpace: srgb, components: [0.08, 0.09, 0.11], alpha: 1 }
      accent:
        $value: { colorSpace: srgb, components: [0.12, 0.38, 0.82], alpha: 1 }
  font:
    family:
      $type: fontFamily
      heading:
        $value: ["Inter", "sans-serif"]
      body:
        $value: ["Inter", "sans-serif"]
  spacing:
    $type: dimension
    sm:
      $value: { value: 0.5, unit: rem }
    md:
      $value: { value: 1, unit: rem }
  radius:
    $type: dimension
    none:
      $value: { value: 0, unit: px }
    md:
      $value: { value: 8, unit: px }
prohibitions:
  - decorative-gradient-without-purpose
  - generic-card-grid
signatureElement: "Use a compact outlined status rail as the recurring product signature."
audit:
  fontFamily:
    ignoreSelectors:
      - "["
