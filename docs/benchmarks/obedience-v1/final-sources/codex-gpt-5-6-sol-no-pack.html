<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Operations Benchmark Fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #f4f6fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f4f6fa;
      }

      header,
      main {
        width: min(100% - 32px, 760px);
        margin-inline: auto;
      }

      header {
        padding-block: 20px 8px;
      }

      nav a {
        color: #174ea6;
        font-weight: 700;
      }

      main {
        padding-block: 16px 40px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
        line-height: 1.2;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 1.35rem;
        line-height: 1.3;
      }

      p {
        max-width: 60ch;
        line-height: 1.55;
      }

      .panel {
        margin-top: 24px;
        padding: 24px;
        border: 1px solid #c8d0df;
        border-radius: 12px;
        background: #ffffff;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: end;
        margin-top: 16px;
      }

      label {
        font-weight: 700;
      }

      input,
      select,
      button {
        min-width: 44px;
        min-height: 44px;
        padding: 10px 12px;
        border: 1px solid #596579;
        border-radius: 6px;
        background: #ffffff;
        color: #172033;
        font: inherit;
      }

      input:focus-visible,
      select:focus-visible,
      button:focus-visible,
      a:focus-visible {
        outline: 3px solid #174ea6;
        outline-offset: 3px;
      }

      button {
        border-color: #163f75;
        background: #174ea6;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #123f88;
      }

      .summary {
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr);
        gap: 20px;
        align-items: center;
        margin-top: 20px;
      }

      .summary img {
        display: block;
        width: 128px;
        height: 80px;
        border-radius: 8px;
        background: #dbe7f8;
      }

      [role="status"] {
        margin: 0;
        padding: 12px;
        border-left: 4px solid #174ea6;
        background: #eef4fc;
        font-weight: 700;
      }

      @media (max-width: 520px) {
        .summary {
          grid-template-columns: 1fr;
        }

        .controls {
          align-items: stretch;
        }

        .controls > * {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header data-benchmark-feature="site-header">
      <nav aria-label="Primary navigation" data-benchmark-feature="primary-navigation">
        <a href="#order-queue">Order operations</a>
      </nav>
    </header>
    <main data-benchmark-feature="app-shell">
      <h1 data-benchmark-feature="primary-heading">Operations overview</h1>
      <p data-benchmark-feature="intro-copy">Review the current queue, find an order, and refresh the status without leaving this page.</p>

      <section class="panel" id="order-queue" aria-labelledby="queue-heading" data-benchmark-feature="order-queue">
        <h2 id="queue-heading" data-benchmark-feature="secondary-heading">Order queue</h2>

        <div class="field">
          <label for="order-search" data-benchmark-feature="search-label">Search orders</label>
          <input
            id="order-search"
            name="order-search"
            type="search"
            autocomplete="off"
            data-benchmark-feature="search-input"
          >
        </div>

        <div class="controls">
          <div class="field">
            <label for="queue-filter" data-benchmark-feature="filter-label">Queue status</label>
            <select id="queue-filter" name="queue-filter" data-benchmark-feature="filter-control">
              <option>All orders</option>
              <option>Pending orders</option>
            </select>
          </div>
          <button type="button" data-benchmark-feature="refresh-action">Refresh orders</button>
        </div>

        <div class="summary" data-benchmark-feature="queue-summary">
          <img
            src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
            alt="Order queue volume preview"
            data-benchmark-feature="queue-image"
          >
          <p role="status" aria-live="polite" data-benchmark-feature="status-content">Pending orders: 0</p>
        </div>
      </section>
    </main>
  </body>
</html>
